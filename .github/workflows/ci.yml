name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      # All uv commands below resolve to this interpreter.
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the schema-contract guard can diff against the PR
          # base SHA (a shallow clone leaves the base commit unreachable).
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Schema contract guard
        # Fail the build if bench-schemas changed without a SCHEMA_VERSION bump.
        # Only meaningful on PRs; the base SHA is reachable thanks to fetch-depth: 0.
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if git diff --name-only "$BASE_SHA"...HEAD | grep -q 'bench-schemas/src'; then
            git diff "$BASE_SHA"...HEAD -- packages/bench-schemas/src/bench_schemas/models.py \
              | grep -q 'SCHEMA_VERSION' \
              || (echo "::error::bench-schemas changed but SCHEMA_VERSION was not bumped (see DECISIONS.md D-03)" && exit 1)
          fi

      - name: Test
        run: uv run pytest -q
