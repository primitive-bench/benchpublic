[project]
name = "eval-ocr"
version = "0.1.0"
description = "Primitive Bench eval vertical: OCR — six-model adapters, three-loop change-detection, per-doc-type slices"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["bench-schemas", "bench-core", "bench-stats", "bench-adapters"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eval_ocr"]
