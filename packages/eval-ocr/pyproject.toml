[project]
name = "eval-ocr"
version = "0.1.0"
description = "Primitive Bench eval vertical: OCR — six-model adapters, three-loop change-detection, per-doc-type slices"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "bench-schemas",
    "bench-core",
    "bench-stats",
    "bench-adapters",
    "pyyaml>=6.0",
    "rapidfuzz>=3.0",
    "fuzzysearch>=0.7",
    "Pillow>=10.0",
    "pymupdf>=1.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eval_ocr"]
