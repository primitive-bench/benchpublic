[project]
name = "bench-core"
version = "0.1.0"
description = "Harness engine for Primitive Bench"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = ["bench-schemas"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bench_core"]
