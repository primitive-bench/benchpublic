[project]
name = "bench-stats"
version = "0.1.0"
description = "Statistics library for Primitive Bench (McNemar, Wilson, bootstrap, IR metrics)"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["bench-schemas", "scipy", "statsmodels"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bench_stats"]
