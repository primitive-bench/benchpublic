[project]
name = "eval-websearch"
version = "0.1.0"
description = "Primitive Bench eval vertical: Web search — three-tier ground truth, query-form strata, McNemar separability"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["bench-schemas", "bench-core", "bench-stats", "bench-adapters"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eval_websearch"]
