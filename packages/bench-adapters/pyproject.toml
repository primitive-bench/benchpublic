[project]
name = "bench-adapters"
version = "0.1.0"
description = "Provider/primitive adapter SDK for Primitive Bench"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = ["bench-schemas", "httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bench_adapters"]
