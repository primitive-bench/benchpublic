[project]
name = "eval-reranker"
version = "0.1.0"
description = "Primitive Bench eval vertical: Reranker — MRR/MAP/nDCG + latency-vs-quality slices"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = ["bench-schemas", "bench-core", "bench-stats", "bench-adapters"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eval_reranker"]
