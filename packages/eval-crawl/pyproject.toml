[project]
name = "eval-crawl"
version = "0.1.0"
description = "Primitive Bench eval vertical: Crawl/scrape — greenfield golden sets"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = ["bench-schemas", "bench-core", "bench-stats", "bench-adapters"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eval_crawl"]
