# Slice / constraint definitions for the extraction primitive.
# Ported from AgentsBenchmark primitives/web_extraction.yaml (difficulty strata)
# and the GoldenEvalsWebSearch extract probe (per-source token-survival slices).
#
# Each slice becomes a SliceResult per adapter. Trust rule: a slice only publishes
# a winner if adapters are statistically separable (Wilson intervals must clear).
#
# Strata are DIFFICULTY AXES, not topics — each is chosen to SEPARATE vendors.
# Sources are the authoritative registries the golden rows are drawn from; the
# anti-bot story lives on `source:fed_register`, where Exa is firewalled.
primitive: extraction

# Scored cell terminal states (equivalence-state model, see states.py).
# blocked is first-class: an anti-bot wall is a DIFFERENT gap than a token miss.
result_states: [correct, incorrect, no_coverage, blocked, timeout, fetch_failed]

# Token-survival is whitespace-normalized substring; FR doc numbers / CVE IDs /
# SEC accession numbers are exact strings.
scoring:
  metric: token_survival          # hit = truth_token survives extraction
  match: normalized_substring
  miss_reasons: [blocked, truncated, token_absent, empty]

regions: [us, eu, apac]

slices:
  # --- difficulty strata (from AgentsBenchmark web_extraction.yaml) ---
  - key: stratum:static_html
    description: "Server-rendered, fields in initial HTML."
    separates: "baseline fetch+parse competence"
    weight: 0.25
  - key: stratum:js_rendered
    description: "Fields appear only after client-side JS executes."
    separates: "headless-render capability vs naive fetch"
    weight: 0.35
  - key: stratum:ambiguous_layout
    description: "Multiple plausible price/title nodes; needs disambiguation."
    separates: "selector robustness vs first-match guessing"
    weight: 0.25
  - key: stratum:paginated_or_lazy
    description: "Content behind lazy-load / infinite scroll."
    separates: "interaction depth"
    weight: 0.15

  # --- authoritative-source slices (from the GoldenEvalsWebSearch extract probe) ---
  # source:fed_register is THE anti-bot slice: Exa scores ~33% token survival here,
  # and 98/100 of its misses are `blocked` (access-wall interstitial), not
  # `token_absent` — the gap is anti-bot blocking, not freshness.
  - key: source:fed_register
    description: "Federal Register documents (FR doc numbers, deep-body tokens)."
    separates: "anti-bot evasion + deep-body token survival under truncation"
  - key: source:sec_edgar
    description: "SEC EDGAR filings (accession numbers)."
    separates: "long-document extraction fidelity"
  - key: source:nvd_cve
    description: "NVD CVE records (CVE IDs, title-zone tokens at offset ~0)."
    separates: "title/snippet survival (saturates) vs deep extraction"
  - key: source:github_releases
    description: "GitHub release pages (version tags, JS-rendered)."
    separates: "headless-render of client-side content"

  # --- token-depth slice (depth-conditional survival, see scoring.token_locate) ---
  # Separates snippet-only extractors that look good on title-zone tokens (CVE IDs,
  # offset ~0) from those that survive deep-body tokens (FR doc numbers).
  - key: token_depth:title_zone
    description: "Truth token sits at offset ~0 (title/URL); survives any truncation."
    separates: "trivial survival floor"
  - key: token_depth:deep_body
    description: "Truth token sits deep in the body; dies under truncation."
    separates: "full-content extraction vs snippet truncation"
