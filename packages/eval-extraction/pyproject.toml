[project]
name = "eval-extraction"
version = "0.1.0"
description = "Primitive Bench eval vertical: Structured extraction — forms/tables -> JSON, human-verified"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["bench-schemas", "bench-core", "bench-stats", "bench-adapters", "pyyaml"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eval_extraction"]
